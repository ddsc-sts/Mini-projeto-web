<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nosso Restaurante - Peça Agora</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="logo">
                <img src="imagens/logo.png" alt="Logo do Restaurante">
            </div>
            
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="cardapio.html">Cardápio</a></li>
            </ul>

            <div class="nav-action">
                <a href="checkout.html" class="btn-login">Cadastro / Login</a>
            </div>
        </nav>
    </header>

    <main>
        <section class="promocoes">
            <div class="banner-principal">
                <a href="cardapio.html">
                    <img src="imagens/banner-principal.jpg" alt="Grande Promoção do Dia - Clique para pedir">
                </a>
            </div>

            <div class="banners-menores">
                <a href="cardapio.html" class="card-promo">
                    <img src="imagens/promo1.jpg" alt="Promoção 2 Pizzas">
                </a>
                <a href="cardapio.html" class="card-promo">
                    <img src="imagens/promo2.jpg" alt="Promoção Bebida">
                </a>
                <a href="cardapio.html" class="card-promo">
                    <img src="imagens/promo3.jpg" alt="Promoção Sobremesa">
                </a>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-container" id="sobre-nos">
            <div class="footer-logo">
                <img src="imagens/logo.png" alt="Logo do Restaurante">
            </div>
            
            <div class="footer-info">
                <h3>Sobre Nós</h3>
                <p>Somos apaixonados por entregar a melhor comida direto na sua mesa. Ingredientes frescos e preparo rápido para garantir a sua satisfação.</p>
            </div>

            <div class="footer-links">
                <h3>Atendimento</h3>
                <ul>
                    <li><a href="#sobre-nos">Nossa História</a></li>
                </ul>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 Nosso Restaurante. Todos os direitos reservados.</p>
        </div>
    </footer>

</body>
</html>
