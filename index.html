<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nosso Restaurante - Peça Agora</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <nav class="navbar">
            <!-- fix 5: logo clicável → index.html -->
            <a href="index.html" class="logo">
                <img src="img/banners/logo.png" alt="Logo do Restaurante">
            </a>

            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="cardapio.html">Cardápio</a></li>
            </ul>

            <!-- fix 2: dois botões separados -->
            <div class="nav-action">
                <a href="login.html"    class="btn-login">Entrar</a>
                <a href="cadastro.html" class="btn-cadastro">Criar conta</a>
            </div>
        </nav>
    </header>

    <main>
        <section class="promocoes">

            <div class="banner-principal">
                <a href="cardapio.html">
                    <img src="img/banners/a.png" alt="Promoção do Dia">
                </a>
            </div>

            <!--
                Layout: 1 grande (topo) + 3 pequenos lado a lado (abaixo)
                Troque o texto de .card-label para nomear cada categoria
            -->
            <div class="categorias">

                <!-- 1 grande — largura total -->
                <a href="cardapio.html" class="card-promo card-promo--lg">
                    <img src="img/banners/logo.png" alt="Categoria 1">
                    <span class="card-label">NOME DA CATEGORIA</span>
                </a>

                <!-- 3 pequenos lado a lado -->
                <a href="cardapio.html" class="card-promo card-promo--sm">
                    <img src="img/banners/logo.png" alt="Categoria 2">
                    <span class="card-label">NOME DA CATEGORIA</span>
                </a>
                <a href="cardapio.html" class="card-promo card-promo--sm">
                    <img src="img/banners/logo.png" alt="Categoria 3">
                    <span class="card-label">NOME DA CATEGORIA</span>
                </a>
                <a href="cardapio.html" class="card-promo card-promo--sm">
                    <img src="img/banners/logo.png" alt="Categoria 4">
                    <span class="card-label">NOME DA CATEGORIA</span>
                </a>

            </div>

        </section>
    </main>

    <footer>
        <div class="footer-container" id="sobre-nos">

            <!-- fix 5 + fix 6: logo grande, centralizado, clicável -->
            <a href="index.html" class="footer-logo">
                <img src="img/banners/logo.png" alt="Logo do Restaurante">
            </a>

            <div class="footer-divider"></div>

            <div class="footer-links">
                <h3>Veja mais</h3>
                <ul>
                    <li><a href="cardapio.html">Cardápio completo</a></li>
                    <li><a href="#sobre-nos">Nossa História</a></li>
                </ul>
            </div>

        </div>

        <div class="footer-bottom">
            <p>&copy; 2026 Nosso Restaurante. Todos os direitos reservados.</p>
        </div>
    </footer>

</body>
</html>
