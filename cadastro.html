<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - DALEGÉ</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="img/icons/favicon.png">
</head>
<body>

    <header>
        <nav class="navbar">
            <a href="index.html" class="logo">
                <img src="img/icons/logo.png" alt="Logo do Restaurante">
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="cardapio.html">Cardápio</a></li>
            </ul>
            <div class="nav-action">
                <a href="login.html"    class="btn-login">Entrar</a>
                <a href="cadastro.html" class="btn-cadastro">Criar conta</a>
            </div>
        </nav>
    </header>

    <main class="auth-page">
        <div class="auth-card">

            <a href="index.html" class="auth-card__logo">
                <img src="img/icons/logo.png" alt="Logo DALEGÉ">
            </a>

            <h1 class="auth-card__titulo">Crie sua conta</h1>
            <p class="auth-card__subtitulo">Rápido e gratuito. Comece a pedir agora.</p>

            <form id="form-cadastro" class="auth-form" novalidate>

                <div class="campo">
                    <label class="campo__label" for="nome">Nome Completo</label>
                    <input class="campo__input" type="text" id="nome"
                           placeholder="Seu nome completo" required>
                </div>

                <div class="campo">
                    <label class="campo__label" for="email">E-mail</label>
                    <input class="campo__input" type="email" id="email"
                           placeholder="exemplo@email.com" required>
                </div>

                <div class="campo">
                    <label class="campo__label" for="senha">Senha</label>
                    <input class="campo__input" type="password" id="senha"
                           placeholder="Mínimo 8 caracteres" required minlength="8">
                </div>

                <div class="campo">
                    <label class="campo__label" for="confirmar-senha">Confirmar Senha</label>
                    <input class="campo__input" type="password" id="confirmar-senha"
                           placeholder="Repita a senha" required>
                </div>

                <!-- mensagem de erro — preenchida e exibida pelo JS -->
                <p id="mensagem-erro" class="checkout-erro" aria-live="polite" hidden></p>

                <button type="submit" class="btn-cadastro auth-submit">Criar Conta</button>

            </form>

            <p class="auth-card__rodape">
                Já tem uma conta?
                <a href="login.html" class="auth-card__link">Entrar</a>
            </p>

        </div>
    </main>

    <footer>
        <div class="footer-container" id="sobre-nos">
            <a href="index.html" class="footer-logo">
                <img src="img/icons/logo.png" alt="Logo do Restaurante">
            </a>
            <div class="footer-divider"></div>
            <div class="footer-links">
                <h3>Veja mais</h3>
                <ul>
                    <li><a href="cardapio.html">Cardápio completo</a></li>
                    <li><a href="sobre.html">Nossa História</a></li>
                </ul>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 DALEGÉ. Todos os direitos reservados.</p>
        </div>
    </footer>

    <script src="js/cadastro.js"></script>
</body>
</html>
