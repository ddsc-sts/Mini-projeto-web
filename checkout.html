<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DALEGÉ - Peça Agora</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="img/icons/favicon.png">

</head>
<body>

    <header>
        <nav class="navbar">
            <!-- fix 5: logo clicável → index.html -->
            <a href="index.html" class="logo">
                <img src="img/icons/logo.png" alt="Logo do Restaurante">
            </a>

            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="cardapio.html">Cardápio</a></li>
            </ul>

            <!-- fix 2: dois botões separados -->
            <div class="nav-action">
                <a href="login.html"    class="btn-login">Entrar</a>
                <a href="cadastro.html" class="btn-cadastro">Criar conta</a>
            </div>
        </nav>
    </header>

    <main class="container-checkout">

        <!-- ── FORMULÁRIO ─────────────────────────────────── -->
        <section class="checkout-form">
            <h2 class="section-titulo">Finalize seu Pedido</h2>
            <p class="checkout-form__desc">Preencha os dados abaixo para enviarmos o pedido para a sua mesa.</p>

            <form id="form-checkout" novalidate>

                <div class="campo">
                    <label class="campo__label" for="nome">Nome Completo</label>
                    <input class="campo__input" type="text" id="nome" placeholder="Digite seu nome" required>
                </div>


                <div class="campo">
                    <label class="campo__label" for="mesa">Número da Mesa</label>
                    <input class="campo__input" type="number" id="mesa" min="1" max="20" placeholder="Ex: 12" required>
                </div>


                <!-- mensagem de erro — preenchida pelo JS -->
                <p id="mensagem-erro" class="checkout-erro" aria-live="polite" hidden></p>

                <button type="submit" class="btn-cadastro checkout-submit">Confirmar Pedido</button>
            </form>
        </section>

        <!-- ── RESUMO DO PEDIDO ────────────────────────────── -->
        <aside class="checkout-resumo">
            <h3 class="section-titulo">Resumo do Pedido</h3>

            <!--
                JS popula esta lista dinamicamente.
                Cada <li> deve ser criado com a classe .resumo-item
                Estrutura esperada de cada item injetado pelo JS:

                <li class="resumo-item">
                    <span class="resumo-item__nome">Nome do produto</span>
                    <span class="resumo-item__qtd">x2</span>
                    <span class="resumo-item__preco">R$ 54,90</span>
                </li>
            -->
            <ul id="lista-resumo" class="resumo-lista">
                <!-- itens inseridos pelo JS -->
            </ul>

            <!-- mensagem exibida quando o carrinho está vazio — JS alterna hidden -->
            <p id="resumo-vazio" class="resumo-vazio" hidden>Nenhum item no carrinho.</p>

            <div class="resumo-total">
                <span class="resumo-total__label">Total a Pagar</span>
                <!-- valor preenchido pelo JS -->
                <span class="resumo-total__valor" id="total-checkout">R$ 0,00</span>
            </div>
        </aside>

    </main>

    <footer>
        <div class="footer-container" id="sobre-nos">

            <!-- fix 5 + fix 6: logo grande, centralizado, clicável -->
            <a href="index.html" class="footer-logo">
                <img src="img/icons/logo.png" alt="Logo do Restaurante">
            </a>

            <div class="footer-divider"></div>

            <div class="footer-links">
                <h3>Veja mais</h3>
                <ul>
                    <li><a href="cardapio.html">Cardápio completo</a></li>
                    <li><a href="sobre.html">Nossa História</a></li>
                </ul>
            </div>

        </div>

        <div class="footer-bottom">
            <p>&copy; 2026 DALEGÉ. Todos os direitos reservados.</p>
        </div>
    </footer>

    <script src="js/navbar.js"></script>
    <script src="js/checkout.js"></script>
</body>
</html>
